<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Nocturn — Загрузка</title>
  <style>
    :root {
      --bg-base:#1e1e1e; --fg:#cccccc; --fg-muted:#858585;
      --accent:#007acc; --font:'Inter',system-ui,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font);font-size:13px;color:var(--fg);background:var(--bg-base);
         height:100vh;display:flex;align-items:center;justify-content:center;}
    .wrap{display:flex;flex-direction:column;align-items:center;gap:20px;}
    .logo{width:48px;height:48px;background:var(--accent);border-radius:12px;
          display:flex;align-items:center;justify-content:center;
          font-weight:700;font-size:26px;color:#fff;}
    .app-name{font-size:18px;font-weight:600;color:var(--fg);letter-spacing:.01em;}
    .spinner{width:24px;height:24px;border:2px solid rgba(255,255,255,.1);
             border-top-color:var(--accent);border-radius:50%;
             animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .label{font-size:12px;color:var(--fg-muted);}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">N</div>
    <div class="app-name">Nocturn</div>
    <div class="spinner"></div>
    <div class="label">Выполняется авторизация...</div>
  </div>
</body>
</html>
