services:
  postgres-test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: nocturn_test
      POSTGRES_USER: nocturn
      POSTGRES_PASSWORD: nocturn_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nocturn"]
      interval: 2s
      timeout: 3s
      retries: 10

  redis-test:
    image: redis:alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  backend-test:
    build:
      context: ./backend
      args:
        INSTALL_DEV: "true"
    working_dir: /app
    command: ["./.venv/bin/python", "-m", "pytest", "-q"]
    environment:
      DATABASE_URL: postgresql+asyncpg://nocturn:nocturn_test@postgres-test/nocturn_test
      REDIS_URL: redis://redis-test:6379/0
      JWT_SECRET: testsecret1234567890testsecret123456
      ROUTERAI_API_KEY: ""
      ROUTERAI_LLM_MODEL: ""
      ROUTERAI_EMBEDDING_MODEL: ""
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
