services:
  postgres-test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: nocturn_test
      POSTGRES_USER: nocturn
      POSTGRES_PASSWORD: nocturn_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nocturn"]
      interval: 2s
      timeout: 3s
      retries: 10

  redis-test:
    image: redis:alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
